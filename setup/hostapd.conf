interface=wlan0
driver=nl80211

# Network name — replaced by install.sh from config.yaml
ssid=__SSID__

# 2.4 GHz, channel 6
hw_mode=g
channel=6

# WPA2
auth_algs=1
wpa=2
wpa_passphrase=__PASSWORD__
wpa_key_mgmt=WPA-PSK
wpa_pairwise=CCMP
rsn_pairwise=CCMP

# Allow all clients
macaddr_acl=0
ignore_broadcast_ssid=0
