# CARSDR Station — dnsmasq config
# Provides DHCP for phones connecting to the Wi-Fi hotspot

# Only serve DHCP on the hotspot interface
interface=wlan0
bind-interfaces

# DHCP range — assigns IPs to phones in 10.0.0.2–50 range, 24h lease
dhcp-range=10.0.0.2,10.0.0.50,255.255.255.0,24h

# Tell phones that the Pi is the gateway and DNS resolver
dhcp-option=3,10.0.0.1
dhcp-option=6,10.0.0.1

# No upstream DNS needed (offline use)
no-resolv
no-poll
